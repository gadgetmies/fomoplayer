name: PR Demo (local)

# Records a demo by running the cascade-test against a backend + Postgres spun
# up inside the Actions runner — no deployed preview required. Opt in by adding
# a fenced ```demo-test``` block to a trusted PR's body naming a committed
# cascade-test path:
#
#   ```demo-test
#   test/browser/admin-radiator.js
#   ```
#
# Because the test drives a local backend it can seed the database directly,
# which is how tests like the admin Radiator demo populate their view. For a
# recording against the real Railway preview, use a ```demo-preview``` block
# instead (see pr-demo-preview.yml).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  demo-local:
    if: >-
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'COLLABORATOR') &&
      contains(github.event.pull_request.body, '```demo-test')
    runs-on: ubuntu-latest
    container: node:22

    permissions:
      # write (not read) so the trace can be published to the gh-pages branch.
      contents: write
      pull-requests: write

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Preinstall system dependencies
        # zip/unzip are needed by redact-trace.js to rewrite the trace archive.
        run: apt-get update && apt-get install -y git postgresql-client unzip zip

      # The PR body provides the test path inside a fenced demo-test block.
      - name: Extract test file from PR body
        id: demo
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? ''
            const match = body.match(/```demo-test\r?\n([\s\S]*?)```/)
            if (!match) {
              core.setFailed('No ```demo-test``` block found in PR body. Add one with a test file path.')
              return
            }
            const testFile = match[1].trim()
            if (!testFile.endsWith('.js') || testFile.includes('..')) {
              core.setFailed(`Invalid test file path: "${testFile}"`)
              return
            }
            console.log(`Recording demo test: ${testFile}`)
            core.setOutput('test_file', testFile)

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser
        run: yarn workspace fomoplayer_back run playwright install --with-deps chromium

      - name: Set up database
        run: psql -h postgres -U postgres -c 'CREATE DATABASE "multi-store-player-test";'
        env:
          PGPASSWORD: postgres

      # Build the frontend into packages/back/public so the local backend serves
      # the app under test (mirrors the root ci:test:browser script).
      - name: Build frontend
        run: NODE_ENV=ci yarn build
        env:
          REACT_APP_ENV: ci

      # Record the test in demo mode: VIDEO_DIR enables recording, and setup.js
      # turns on slow-mo + the cursor/click/keyboard overlay whenever VIDEO_DIR
      # is set. No PREVIEW_URL, so the test runs against the local backend.
      # NOTE: this is a container job, so use the $GITHUB_WORKSPACE env var (the
      # workspace path *inside* the container, e.g. /__w/<repo>/<repo>) rather
      # than the ${{ github.workspace }} expression, which expands to the *host*
      # path (/home/runner/work/...). The runner path-translates env/inputs into
      # the container but does NOT rewrite ${{ github.workspace }} substituted as
      # a literal string inside a run: script — mixing the two made the recording
      # land under $GITHUB_WORKSPACE while the verify step looked at the host path
      # and falsely reported a zero-byte recording.
      - name: Record demo test
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres/multi-store-player-test
          REACT_APP_ENV: ci
          # Pace the recording slowly enough to follow, and hold on the final
          # frame for a moment at the end so the closing state is reviewable.
          PW_SLOWMO: '1200'
          PW_END_IDLE_MS: '4000'
        run: |
          export VIDEO_DIR="$GITHUB_WORKSPACE/demo-output"
          TEST_FILE="${{ steps.demo.outputs.test_file }}"
          TEST_DIR=$(dirname "$TEST_FILE")
          TEST_REGEX="$(basename "$TEST_FILE" | sed 's/\./\\./g')$"
          yarn workspace fomoplayer_back ci:demo "$TEST_DIR" --regex "$TEST_REGEX"

      # Guard against a regression of the zero-byte-video bug: Playwright only
      # flushes a recording when its context/browser closes, so if that ever
      # stops happening we want the job to fail here rather than silently upload
      # an empty artifact.
      - name: Verify recording is non-empty
        run: |
          DIR="$GITHUB_WORKSPACE/demo-output"
          if ! find "$DIR" -type f -name '*.webm' -size +0c | grep -q .; then
            echo "::error::No non-empty video was recorded in ${DIR} — the demo recording produced zero-byte output."
            ls -la "$DIR" || true
            exit 1
          fi
          echo "Recorded videos:"
          find "$DIR" -type f -name '*.webm' -printf '%s\t%p\n'
          if ! find "$DIR" -type f -name '*.zip' -size +0c | grep -q .; then
            echo "::error::No non-empty Playwright trace was written in ${DIR} — tracing produced no output."
            ls -la "$DIR" || true
            exit 1
          fi
          echo "Recorded traces:"
          find "$DIR" -type f -name '*.zip' -printf '%s\t%p\n'

      # Scrub the session cookie from the trace before it leaves the runner.
      # The local login uses fixture creds (no live secret), but redacting keeps
      # behaviour uniform with the preview workflow and guards future changes.
      - name: Redact trace
        if: always()
        run: node packages/back/test/lib/redact-trace.js "$GITHUB_WORKSPACE/demo-output"

      # Publish the trace to gh-pages for one-click viewing. Requires GitHub
      # Pages to be enabled (Settings → Pages → Deploy from a branch → gh-pages).
      - name: Publish trace to Pages
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/publish-trace.sh local "$GITHUB_WORKSPACE/demo-output"

      # Surface what landed in demo-output in the PR comment — handy when a
      # recording is empty/missing and the raw run logs aren't readily accessible.
      - name: Collect recording diagnostics
        if: always()
        run: |
          DIR="$GITHUB_WORKSPACE/demo-output"
          {
            echo "DEMO_DIAG<<DIAG_EOF"
            echo "recording dir: ${DIR}"
            ls -laR "$DIR" 2>&1 || echo "(demo-output missing)"
            echo ""
            echo "webm files and sizes:"
            find "$DIR" -type f -name '*.webm' -printf '%s bytes\t%p\n' 2>&1 || echo "(none)"
            echo ""
            echo "trace files and sizes:"
            find "$DIR" -type f -name '*.zip' -printf '%s bytes\t%p\n' 2>&1 || echo "(none)"
            echo "DIAG_EOF"
          } >> "$GITHUB_ENV"

      # Uploads the whole demo-output dir, so the recorded video (.webm) and the
      # Playwright trace(s) (.zip) ship together in the same artifact.
      - name: Upload demo video and trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-local-pr-${{ github.event.pull_request.number }}
          path: ${{ github.workspace }}/demo-output/
          retention-days: 30

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const succeeded = '${{ job.status }}' === 'success'
            const icon = succeeded ? '✅' : '❌'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const diag = process.env.DEMO_DIAG || '(no diagnostics captured)'
            const prNumber = context.payload.pull_request.number
            const owner = context.repo.owner.toLowerCase()
            const repo = context.repo.repo
            const dir = `${process.env.GITHUB_WORKSPACE}/demo-output`
            // trace.playwright.dev fetches the trace from a public, CORS-enabled
            // URL passed via ?trace=. gh-pages Pages URL is primary;
            // raw.githubusercontent.com is the fallback (works pre-Pages-enable).
            const viewer = (url) => `https://trace.playwright.dev/?trace=${encodeURIComponent(url)}`
            const traceLines = []
            try {
              for (const file of fs.readdirSync(dir).filter((f) => f.endsWith('.zip')).sort()) {
                const rel = `traces/pr-${prNumber}/local/${file}`
                const pagesUrl = `https://${owner}.github.io/${repo}/${rel}`
                const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/gh-pages/${rel}`
                traceLines.push(`- \`${file}\`: [open in trace viewer](${viewer(pagesUrl)}) · [fallback](${viewer(rawUrl)})`)
              }
            } catch (e) {}
            const traceSection = traceLines.length
              ? ['', 'Open the Playwright trace in your browser — no download needed:', ...traceLines,
                 '', "_If \"open in trace viewer\" can't load it, the repo's GitHub Pages isn't enabled yet — use the `fallback` link, or download the artifact and run `npx playwright show-trace`._"]
              : []
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                `${icon} **Demo (local) ${succeeded ? 'succeeded' : 'failed'}**`,
                '',
                `[View recording and run logs](${runUrl})`,
                ...traceSection,
                '',
                'Or download the `demo-local-pr-${{ github.event.pull_request.number }}` artifact to watch the video (`.webm`) and open the trace(s) with `npx playwright show-trace trace.zip` (or `trace-mobile.zip`).',
                '',
                '<details><summary>Recording diagnostics</summary>',
                '',
                '```',
                diag,
                '```',
                '</details>',
              ].join('\n'),
            })
