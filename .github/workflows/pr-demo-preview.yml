name: PR Demo (preview)

# Records a demo against the Railway PR preview. Opt in by adding a fenced
# ```demo-preview``` block to a trusted PR's body naming a committed
# cascade-test path. The author-association gate stops drive-by PRs from
# consuming preview minutes or GitHub Actions minutes on the maintainer's
# account.
#
# For a self-contained recording that does not need a deployed preview, use a
# ```demo-test``` block instead (see pr-demo-local.yml).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  demo-preview:
    if: >-
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'COLLABORATOR') &&
      contains(github.event.pull_request.body, '```demo-preview')
    runs-on: ubuntu-latest

    # Bind the job to the `preview-admin` GitHub Environment so the minted OIDC
    # token's `sub` becomes `repo:<owner>/<repo>:environment:preview-admin`. The
    # preview backend derives that exact sub from GITHUB_ACTIONS_OIDC_REPO and
    # grants it admin, so the demo can drive admin views with no extra env var.
    # The name is intentionally static (keep it in sync with config.js); protect
    # this environment (required reviewers / branch restrictions) to control who
    # can obtain the admin sub.
    environment: preview-admin

    permissions:
      # Required to mint a GitHub Actions OIDC token for keyless login.
      id-token: write
      # write (not read) so the trace can be published to the gh-pages branch.
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # ── 1. Determine the Railway PR preview URL ───────────────────────────
      # Set RAILWAY_SERVICE_NAME and RAILWAY_PROJECT_NAME as repository
      # variables (Settings → Variables → Actions).
      - name: Determine preview URL
        id: preview
        run: |
          PREVIEW_URL="https://${{ vars.RAILWAY_SERVICE_NAME }}-${{ vars.RAILWAY_PROJECT_NAME }}-pr-${{ github.event.pull_request.number }}.up.railway.app"
          echo "url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      # ── 2. Wait for the Railway preview to be live ────────────────────────
      - name: Wait for preview deployment
        run: |
          URL="${{ steps.preview.outputs.url }}"
          echo "Polling ${URL}/api/health ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${URL}/api/health" || echo 000)
            if [ "$STATUS" = "200" ]; then echo "Ready (attempt ${i})"; exit 0; fi
            echo "Attempt ${i}/30 — HTTP ${STATUS} — retrying in 10s"; sleep 10
          done
          echo "::error::Preview did not become ready within 5 minutes"; exit 1

      # ── 3. Extract the test file path from the PR body ────────────────────
      # The PR body must contain a fenced demo-preview block with the path to a
      # committed browser test relative to packages/back/, e.g.:
      #
      #   ```demo-preview
      #   test/browser/playback.js
      #   ```
      - name: Extract test file from PR body
        id: demo
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? ''
            const match = body.match(/```demo-preview\r?\n([\s\S]*?)```/)
            if (!match) {
              core.setFailed('No ```demo-preview``` block found in PR body. Add one with a test file path.')
              return
            }
            const testFile = match[1].trim()
            if (!testFile.endsWith('.js') || testFile.includes('..')) {
              core.setFailed(`Invalid test file path: "${testFile}"`)
              return
            }
            console.log(`Running demo test: ${testFile}`)
            core.setOutput('test_file', testFile)

      # ── 4. Get a GitHub Actions OIDC token for keyless preview login ──────
      # Audience is bound to this specific preview URL; the backend rejects
      # tokens with a mismatched audience so tokens cannot be replayed across
      # deployments. The token is masked in all subsequent log output.
      - name: Get OIDC token
        run: |
          PREVIEW_URL="${{ steps.preview.outputs.url }}"
          TOKEN=$(curl -s \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${PREVIEW_URL}" \
            | jq -r .value)
          echo "::add-mask::${TOKEN}"
          echo "OIDC_TOKEN=${TOKEN}" >> "$GITHUB_ENV"

      # ── 5. Set up Node and dependencies ───────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser
        run: yarn workspace fomoplayer_back run playwright install --with-deps chromium

      # ── 6. Run the browser test in demo mode (slow-mo, video, overlay) ────
      - name: Run demo test
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          VIDEO_DIR: ${{ github.workspace }}/demo-output
          # OIDC_TOKEN is already in env from step 4
          # PW_SLOWMO defaults to 600ms when PREVIEW_URL is set (see setup.js)
        run: |
          cd packages/back
          TEST_FILE="${{ steps.demo.outputs.test_file }}"
          TEST_DIR=$(dirname "$TEST_FILE")
          TEST_REGEX="$(basename "$TEST_FILE" | sed 's/\./\\./g')$"
          yarn ci:demo "$TEST_DIR" --regex "$TEST_REGEX"

      # Guard against a regression of the zero-byte-video bug: Playwright only
      # flushes a recording when its context/browser closes, so if that ever
      # stops happening we want the job to fail here rather than silently upload
      # an empty artifact.
      - name: Verify recording is non-empty
        run: |
          DIR="${{ github.workspace }}/demo-output"
          if ! find "$DIR" -type f -name '*.webm' -size +0c | grep -q .; then
            echo "::error::No non-empty video was recorded in ${DIR} — the demo recording produced zero-byte output."
            ls -la "$DIR" || true
            exit 1
          fi
          echo "Recorded videos:"
          find "$DIR" -type f -name '*.webm' -printf '%s\t%p\n'
          if ! find "$DIR" -type f -name '*.zip' -size +0c | grep -q .; then
            echo "::error::No non-empty Playwright trace was written in ${DIR} — tracing produced no output."
            ls -la "$DIR" || true
            exit 1
          fi
          echo "Recorded traces:"
          find "$DIR" -type f -name '*.zip' -printf '%s\t%p\n'

      # ── 6b. Redact secrets from the trace ─────────────────────────────────
      # The preview login authenticates with the live OIDC token and the trace
      # carries the resulting session cookie on every request. Scrub both before
      # the trace is uploaded as an artifact OR published to Pages. Runs even on
      # test failure so a failing run's trace is still safe to inspect.
      - name: Redact trace
        if: always()
        run: node packages/back/test/lib/redact-trace.js "${{ github.workspace }}/demo-output"
        # OIDC_TOKEN is already in env from step 4 (used as a literal to scrub).

      # ── 6c. Publish the redacted trace to gh-pages for one-click viewing ──
      # Requires GitHub Pages to be enabled for this repo (Settings → Pages →
      # Deploy from a branch → gh-pages → /). The published URL is then opened
      # directly in https://trace.playwright.dev/ — no download needed.
      - name: Publish trace to Pages
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/publish-trace.sh preview "${{ github.workspace }}/demo-output"

      # ── 7. Upload the recorded video and trace ────────────────────────────
      # Uploads the whole demo-output dir, so the recorded video (.webm) and the
      # Playwright trace(s) (.zip) ship together in the same artifact.
      - name: Upload demo video and trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-video-pr-${{ github.event.pull_request.number }}
          path: ${{ github.workspace }}/demo-output/
          retention-days: 30

      # ── 8. Comment on the PR ──────────────────────────────────────────────
      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const succeeded = '${{ job.status }}' === 'success'
            const icon = succeeded ? '✅' : '❌'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const prNumber = context.payload.pull_request.number
            const owner = context.repo.owner.toLowerCase()
            const repo = context.repo.repo
            const dir = `${process.env.GITHUB_WORKSPACE}/demo-output`
            // trace.playwright.dev is a static client-side viewer: it fetches
            // the trace from a public, CORS-enabled URL passed via ?trace=. The
            // gh-pages Pages URL is the primary; raw.githubusercontent.com (also
            // CORS-enabled) is a fallback that works even before Pages is enabled.
            const viewer = (url) => `https://trace.playwright.dev/?trace=${encodeURIComponent(url)}`
            const traceLines = []
            try {
              for (const file of fs.readdirSync(dir).filter((f) => f.endsWith('.zip')).sort()) {
                const rel = `traces/pr-${prNumber}/preview/${file}`
                const pagesUrl = `https://${owner}.github.io/${repo}/${rel}`
                const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/gh-pages/${rel}`
                traceLines.push(`- \`${file}\`: [open in trace viewer](${viewer(pagesUrl)}) · [fallback](${viewer(rawUrl)})`)
              }
            } catch (e) {}
            const traceSection = traceLines.length
              ? ['', 'Open the Playwright trace in your browser — no download needed (secrets redacted):', ...traceLines,
                 '', "_If \"open in trace viewer\" can't load it, the repo's GitHub Pages isn't enabled yet — use the `fallback` link, or download the artifact and run `npx playwright show-trace`._"]
              : []
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                `${icon} **Demo test ${succeeded ? 'succeeded' : 'failed'}**`,
                '',
                `[View recording and run logs](${runUrl})`,
                ...traceSection,
                '',
                'Or download the `demo-video-pr-${{ github.event.pull_request.number }}` artifact to watch the video (`.webm`) and open the trace(s) with `npx playwright show-trace trace.zip` (or `trace-mobile.zip`).',
              ].join('\n'),
            })
